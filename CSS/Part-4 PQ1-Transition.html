<!DOCTYPE html>
<html>
<head>
<title> Transitions </title>
<style>

section{
    margin-top:150px;
    margin-left:70px;
}

div {
    height:30px;
    width:350px;
    background-color:green;
    padding:5px;
    margin:15px auto;
    border:4px solid black;
    color:red;
    text-align:center;
  }

div:nth-of-type(2n){
  background-color:blue;
}

div:nth-of-type(3n){
  background-color:yellow;
}
#one:hover{
  transform:rotate(360deg);
  transition:2s;
  border-radius:80px;
}
#two:hover{
  transform:scale(2,4);
  transition:2s;
  border-radius:80px;
}
#third:hover{
  transform:translate(70px,70px);
  transition:2s;
  border-radius:80px;
}
#forth:hover{
  transform:skew(55deg);
  transition:1s;
  border-radius:80px;
   height:40px;
    
}
#fifth:hover{
  transform:translate(70px) rotate(180deg);
  transition:1s;
  border-radius:80px;
   height:40px;
    
}


</style>

</head>
<body>

<section>
<div id="one"> 1 </div>
<div id="two"> 2 </div>
<div id="third"> 3 </div>
<div id="forth"> 4 </div>
<div id="fifth"> 5 </div>
</section>
</body>
</html>
