<!DOCTYPE html>
<html>
<title>  Smily face </title>
<head>
<style>
.face{
    height:400px;
    width:400px;
    background-color:orange;
    border-radius:50%;
}
.mouth{
    height:100px;
    width:200px;
    background-color:red;
    border-radius: 0 0 50% 50%;
    position:absolute;
    top:250px;
    left:100px;
}
#left-eye,#right-eye{
    height:50px;
    width:50px;
    background-color:black;
    border-radius:50%;
   display:inline-block;
   position:absolute;
   left:100px;
   top:100px;
}

#right-eye{
    left:250px;
}

</style>
</head>
<body>

    <div class="face">   
    <div id="eyes">
        <div id="left-eye"> </div>
        <div id="right-eye"> </div>
    </div>
    </div>
    <div class="mouth">  </div>

</body>
</html>
