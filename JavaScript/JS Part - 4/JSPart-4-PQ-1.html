/*QS.1. Write a program to delete all occurrences of element‘num’ in a given array. Example: if arr = [ 1,2,3,4,5,6,2,3 ] & num = 2 
Result should be arr=[1,3,4,5,6,3] */ 

let arr = ["1","2","3","4","5","6","2","3"];

let num = 2;

console.log("Before Array : ",arr);
for(i=0; i < arr.length ; i++){
    if(arr[i] == num){
        arr.splice(i,1);
    }   
} 
console.log("After array : ",arr);
