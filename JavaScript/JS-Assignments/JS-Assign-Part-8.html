/* AQ.2. Create a new array using the map function whose each element is equal to the
original element plus 5. */



let arr = [32,52,17,27,58];

let newarr = arr.map( (arr) => arr + 5 );
console.log(newarr);                           // [1, 4, 9, 16, 25] + 5  = [37, 57, 22, 32, 63]




/* AQ.3. Create a new array whose elements are in uppercase of words present in the
original array. */


let lower = ["hello","welcome","to","ApnaCollage"];
 
let upper = lower.map( (lower) => lower.toUpperCase());

console.log(upper);                // ['HELLO', 'WELCOME', 'TO', 'APNACOLLAGE']




/* AQ.4. Write a function called doubleAndReturnArgs which accepts an array and a
variable number of arguments. The function should return a new array with the original
array values and all of the additional arguments doubled. */


const doubleAndReturnArgs = (arr, ...args) => [ 
...arr,
...args.map((v) => v * 2), ]

doubleAndReturnArgs([1, 2, 3], 4, 4);         // [1,2,3,8,8] |
doubleAndReturnArgs ([2], 10, 4);         // [2, 20, 8] |



/*
AQ.5. Write a function called mergeObjects that accepts two objects and returns a new
object which contains all the keys and values of the first object and second object.  */
