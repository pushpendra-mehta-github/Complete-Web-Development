 let currChar =   str[i];

/*AQ.4. Write a JavaScript function to count the number of vowels in a String argument*/

function countVowels(vowel) {
 
 let count = 0;
 for(const char of vowel){
    if(char == "a" || char== "e" ||  char== "i" ||  char== "o" ||  char== "u" ) {
       count++;
   }
 }
 console.log(count); // & //  return count; 
}

console.log(countVowels("Apnacollage")); // "Apnacollage"  --> 5 vowels
