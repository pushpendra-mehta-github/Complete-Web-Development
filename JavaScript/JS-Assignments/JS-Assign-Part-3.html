// Qs.3.Write a JavaScript program to check whether a string is blank or not.


let str =  prompt("please enter a string")

if(str.length == 0){
   console.log("The string is Empty");  
}
else{
    console.log("string is not Empty"); // The string is Empty
}




//AQ.4.Write a JavaScript program to test whether the character at the given(character) index is lowercase.


const str2 = "PUSHPENDRA";

const char = str2.charAt(0);

if(char >= 'P' || char <= 'z'){
    console.log("The character is Uppercase"); 
}
else{
    console.log("The character is Lowercase");  // The character is Uppercase
}

let newspace = space.trim();

console.log("After Reduce spaces : " ,newspace);    // 'Raja Mohli'
