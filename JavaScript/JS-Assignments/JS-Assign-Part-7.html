/* Qs1. Write an arrow function named arrayAverage that accepts an array of numbers
and returns the average of those numbers.  */

const numbers = [10, 20, 30, 40];

 const arrayAverage = (array) => {
     let sum =  numbers.reduce( (index ,add) => index + add,0); 
       return sum / numbers.length;
 } 
 console.log(" the average of number : ",arrayAverage(numbers));



 /* Qs2. Write an arrow function named isEven() that takes a single number as argument
and returns if it is even or not. */


const isEven = (value) => {
  if(value % 2 == 0){
    console.log("Number is Even");
  }
  else{
    console.log("Number is Odd");
  }
}

console.log(isEven(18));   //  Number is Even
console.log(isEven(131));  //  Number is Odd
